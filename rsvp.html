<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deltager du? | Astrid & Victor</title>
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-white text-black antialiased selection:bg-black selection:text-white">
    
    <!-- Global Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500 py-4 bg-white shadow-sm text-black">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        
        <!-- Desktop Menu Left -->
        <div class="hidden md:flex items-center gap-8 uppercase tracking-widest text-[10px] font-medium">
          <a href="/" class="hover:opacity-60 transition-opacity">Forside</a>
          <a href="/historie.html" class="hover:opacity-60 transition-opacity">Historie</a>
          <a href="/dagen.html" class="hover:opacity-60 transition-opacity">Dagen</a>
          <a href="/praktisk.html" class="hover:opacity-60 transition-opacity">Praktisk info</a>
          <a href="/onskeliste.html" class="hover:opacity-60 transition-opacity">Ønskeliste</a>
        </div>

        <!-- Desktop Menu Right (CTA) -->
        <div class="flex items-center gap-8">
          <a href="/rsvp.html" class="border-b border-black pb-1 uppercase tracking-widest text-[10px] font-medium">Deltager du?</a>
          
          <!-- Mobile Menu Button -->
          <button id="mobile-menu-btn" class="md:hidden p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
          </button>
        </div>
      </div>

      <!-- Mobile Menu Overlay -->
      <div id="mobile-menu" class="hidden fixed inset-0 bg-black text-white flex flex-col items-center justify-center gap-8 text-xl font-serif italic">
        <button id="mobile-menu-close" class="absolute top-6 right-6">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
        </button>
        <a href="/">Forside</a>
        <a href="/historie.html">Historie</a>
        <a href="/dagen.html">Dagen</a>
        <a href="/praktisk.html">Praktisk info</a>
        <a href="/onskeliste.html">Ønskeliste</a>
        <a href="/rsvp.html" class="border border-white px-10 py-3 mt-4 not-italic uppercase tracking-widest text-sm">Deltager du?</a>
      </div>
    </nav>

    <!-- Content Section -->
    <main class="pt-32 pb-24 px-6 bg-black text-white min-h-screen flex items-center">
      <div class="max-w-xl mx-auto w-full">
        <h1 class="text-4xl md:text-5xl font-serif mb-4 text-center italic">Deltager du?</h1>
        <p class="text-center opacity-60 mb-12 font-light tracking-wide italic">Vi glæder os til at høre fra dig senest d. 1. juni 2026</p>
        
        <div id="rsvp-container">
          <form id="rsvp-form" class="space-y-8" action="https://formspree.io/f/xojyjvvy" method="POST">
            <div>
              <label class="block uppercase tracking-widest text-[10px] mb-2 opacity-60">Navn</label>
              <input 
                required
                type="text" 
                name="name"
                class="w-full bg-transparent border-b border-white/20 py-2 focus:border-white outline-none transition-colors font-light"
                placeholder="Dit fulde navn"
              >
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
              <div>
                <label class="block uppercase tracking-widest text-[10px] mb-2 opacity-60">Deltager du?</label>
                <select 
                  required
                  name="attending"
                  class="w-full bg-transparent border-b border-white/20 py-2 focus:border-white outline-none transition-colors font-light appearance-none"
                >
                  <option value="ja" class="bg-black text-white">Ja, jeg kommer!</option>
                  <option value="nej" class="bg-black text-white">Desværre ikke</option>
                </select>
              </div>
              <div>
                <label class="block uppercase tracking-widest text-[10px] mb-2 opacity-60">Antal gæster</label>
                <input 
                  required
                  type="number" 
                  name="guests"
                  min="1"
                  class="w-full bg-transparent border-b border-white/20 py-2 focus:border-white outline-none transition-colors font-light"
                  placeholder="1"
                >
              </div>
            </div>

            <div>
              <label class="block uppercase tracking-widest text-[10px] mb-2 opacity-60">Eventuel kommentar</label>
              <textarea 
                rows="3"
                name="message"
                class="w-full bg-transparent border-b border-white/20 py-2 focus:border-white outline-none transition-colors font-light resize-none"
                placeholder="Allergier, særlige hensyn eller andet..."
              ></textarea>
            </div>

            <button 
              type="submit"
              class="w-full border border-white/40 py-4 uppercase tracking-[0.3em] text-xs hover:bg-white hover:text-black transition-all duration-500 font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            >
              Indsend svar
            </button>
          </form>

          <div id="rsvp-success" class="hidden text-center py-12">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-6 opacity-40"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <h3 class="text-3xl font-serif mb-4 italic">Tak for dit svar!</h3>
            <a 
              href="/"
              class="inline-block mt-12 text-xs uppercase tracking-widest opacity-40 hover:opacity-100 transition-opacity"
            >
              Tilbage til forsiden
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 px-6 border-t border-white/5 text-center bg-black text-white/40">
      <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-serif italic mb-4 text-white">Astrid & Victor</h2>
        <p class="text-[10px] uppercase tracking-[0.4em]">22.08.2026 — Herslevgaard</p>
      </div>
    </footer>

    <script type="module" src="/src/shared.js"></script>
    <script>
      document.getElementById('mobile-menu-close').addEventListener('click', () => {
        document.getElementById('mobile-menu').classList.add('hidden');
      });
    </script>
  </body>
</html>
