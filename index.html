<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astrid & Victor | Bryllup 2026</title>
    <link rel="stylesheet" href="/src/index.css">
  </head>
  <body class="bg-white text-black antialiased selection:bg-black selection:text-white">
    
    <!-- Global Navigation -->
    <nav class="fixed top-0 left-0 w-full z-50 transition-all duration-500 py-6 text-white" data-transparent="true">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        
        <!-- Desktop Menu Left -->
        <div class="hidden md:flex items-center gap-8 uppercase tracking-widest text-[10px] font-medium">
          <a href="/" class="border-b border-white pb-1">Forside</a>
          <a href="/historie.html" class="hover:opacity-60 transition-opacity">Historie</a>
          <a href="/dagen.html" class="hover:opacity-60 transition-opacity">Dagen</a>
          <a href="/praktisk.html" class="hover:opacity-60 transition-opacity">Praktisk info</a>
          <a href="/onskeliste.html" class="hover:opacity-60 transition-opacity">Ønskeliste</a>
        </div>

        <!-- Desktop Menu Right (CTA) -->
        <div class="flex items-center gap-8">
          <a href="/rsvp.html" class="hidden md:block bg-white text-black px-6 py-2 hover:bg-black hover:text-white transition-all duration-300 uppercase tracking-widest text-[10px] font-medium">Deltager du?</a>
          
          <!-- Mobile Menu Button -->
          <button id="mobile-menu-btn" class="md:hidden p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"></line><line x1="4" x2="20" y1="6" y2="6"></line><line x1="4" x2="20" y1="18" y2="18"></line></svg>
          </button>
        </div>
      </div>

      <!-- Mobile Menu Overlay -->
      <div id="mobile-menu" class="hidden fixed inset-0 bg-black text-white flex flex-col items-center justify-center gap-8 text-xl font-serif italic">
        <button id="mobile-menu-close" class="absolute top-6 right-6">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
        </button>
        <a href="/">Forside</a>
        <a href="/historie.html">Historie</a>
        <a href="/dagen.html">Dagen</a>
        <a href="/praktisk.html">Praktisk info</a>
        <a href="/onskeliste.html">Ønskeliste</a>
        <a href="/rsvp.html" class="border border-white px-10 py-3 mt-4 not-italic uppercase tracking-widest text-sm">Deltager du?</a>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
      <div class="absolute inset-0 z-0">
        <img 
          src="https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&q=80&w=2000" 
          alt="Wedding Background" 
          class="w-full h-full object-cover"
          referrerpolicy="no-referrer"
        />
        <div class="absolute inset-0 bg-black/40"></div>
      </div>
      
      <div class="relative z-10 text-center text-white px-4">
        <span class="uppercase tracking-[0.3em] text-sm mb-4 block font-light">Vi skal giftes</span>
        <h1 class="text-6xl md:text-8xl font-serif mb-6 italic">Astrid & Victor</h1>
        <div class="h-[1px] w-24 bg-white/60 mx-auto mb-6"></div>
        <p class="text-xl md:text-2xl tracking-widest uppercase font-light mb-12">22. August 2026</p>

        <!-- Countdown inside Hero -->
        <div id="countdown" class="grid grid-cols-4 gap-4 md:gap-8 max-w-lg mx-auto mb-16">
          <div class="text-center">
            <div id="days" class="text-2xl md:text-4xl font-serif mb-1">0</div>
            <div class="uppercase tracking-tighter text-[10px] opacity-60">Dage</div>
          </div>
          <div class="text-center">
            <div id="hours" class="text-2xl md:text-4xl font-serif mb-1">0</div>
            <div class="uppercase tracking-tighter text-[10px] opacity-60">Timer</div>
          </div>
          <div class="text-center">
            <div id="mins" class="text-2xl md:text-4xl font-serif mb-1">0</div>
            <div class="uppercase tracking-tighter text-[10px] opacity-60">Min.</div>
          </div>
          <div class="text-center">
            <div id="secs" class="text-2xl md:text-4xl font-serif mb-1">0</div>
            <div class="uppercase tracking-tighter text-[10px] opacity-60">Sek.</div>
          </div>
        </div>

        <div class="flex flex-col md:flex-row gap-6 justify-center items-center">
          <a href="/rsvp.html" class="border border-white px-12 py-4 uppercase tracking-[0.3em] text-xs hover:bg-white hover:text-black transition-all duration-500 font-medium w-full md:w-auto">Deltager du?</a>
        </div>
      </div>

      <div class="absolute bottom-10 left-1/2 -translate-x-1/2 scroll-indicator text-white opacity-60">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 px-6 border-t border-black/5 text-center">
      <div class="max-w-4xl mx-auto">
        <h2 class="text-2xl font-serif italic mb-4">Astrid & Victor</h2>
        <p class="text-[10px] uppercase tracking-[0.4em] text-gray-400">22.08.2026 — Herslevgaard</p>
      </div>
    </footer>

    <script type="module" src="/src/shared.js"></script>
    <script>
      // Extra logic for mobile menu close button
      document.getElementById('mobile-menu-close').addEventListener('click', () => {
        document.getElementById('mobile-menu').classList.add('hidden');
      });
    </script>
  </body>
</html>
